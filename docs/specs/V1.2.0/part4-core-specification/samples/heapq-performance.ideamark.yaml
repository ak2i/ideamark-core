entities:
  - id: ENT-heap-invariant
    kind: structural_principle
    content: A heap is represented as an array constrained by an invariant that keeps the smallest item at index 0.
  - id: ENT-api-alignment
    kind: design_choice
    content: CPython's heap API uses 0-based indexing and exposes a min-heap interface to behave naturally as a Python list.
  - id: ENT-root-restoration
    kind: algorithmic_operation
    content: Removing the root is handled by moving a lower-level item into the root and percolating it down until the invariant is restored.
  - id: ENT-avoid-early-break
    kind: implementation_rationale
    content: The implementation deliberately avoids an early break in _siftup because the moved item after a heap pop tends to be large, and early comparisons often do not pay off.
  - id: ENT-comparison-cost
    kind: performance_factor
    content: Comparison operations may be expensive because the priority may be hidden in custom comparison methods or tuple comparison.
  - id: ENT-comparison-counts
    kind: empirical_evidence
    content: Commented comparison counts support the selected sift strategy for exhaustive heappop operations on random arrays.
  - id: ENT-heapreplace-choice
    kind: api_performance_choice
    content: heapreplace is more efficient than heappop followed by heappush when maintaining a fixed-size heap, but its returned value may be larger than the inserted item.
  - id: ENT-heappushpop-choice
    kind: api_performance_choice
    content: heappushpop conditionally replaces the root only when the new item is larger than the current smallest item, avoiding unnecessary heap growth.
structure:
