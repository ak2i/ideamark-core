meta:
  spec_version: ideamark-core-v1.2.0
  document_id: sample-rust-rfc-design-prose
  status: draft
  title: Rust RFC Design Prose Sample
  projections:
    - role: generation
      ref: projection://samples/formal-rfc-design-rationale-v0
      inline:
        purpose: extract reusable design rationale and compatibility constraints from formal RFC prose
sources:
  - id: SRC-rust-rfc
    type: document
    title: Rust RFC design prose sample
    uri: https://github.com/rust-lang/rfcs
    revision: unspecified
sections:
  - id: SEC-motivation
    title: Motivation as problem framing
    anchors:
      - source: SRC-rust-rfc
        type: heading_path
        path:
          - Motivation
        precision: approximate
        role: problem_framing
    occurrences:
      - OCC-problem-framing
      - OCC-user-impact
  - id: SEC-design-choice
    title: Design choice and tradeoff
    anchors:
      - source: SRC-rust-rfc
        type: heading_path
        path:
          - Detailed design
        precision: approximate
        role: design_choice
    occurrences:
      - OCC-design-mechanism
      - OCC-tradeoff
  - id: SEC-compatibility
    title: Compatibility and migration concerns
    anchors:
      - source: SRC-rust-rfc
        type: heading_path
        path:
          - Drawbacks
        precision: approximate
        role: compatibility_review
    occurrences:
      - OCC-compatibility-constraint
      - OCC-migration-cost
occurrences:
  - id: OCC-problem-framing
    entity: ENT-problem-framing
    role: frames_design_problem
  - id: OCC-user-impact
    entity: ENT-user-impact
    role: explains_why_change_matters
  - id: OCC-design-mechanism
    entity: ENT-design-mechanism
    role: states_selected_mechanism
  - id: OCC-tradeoff
    entity: ENT-design-tradeoff
    role: records_tradeoff
  - id: OCC-compatibility-constraint
    entity: ENT-compatibility-constraint
    role: identifies_constraint
  - id: OCC-migration-cost
    entity: ENT-migration-cost
    role: identifies_adoption_cost
entities:
  - id: ENT-problem-framing
    kind: design_problem
    content: Formal design prose begins by identifying the practical or language-level problem that motivates a change.
  - id: ENT-user-impact
    kind: motivation
    content: Motivation sections connect the design problem to concrete developer impact or ecosystem pressure.
  - id: ENT-design-mechanism
    kind: design_choice
    content: Detailed design sections describe the selected mechanism that resolves the motivating problem.
  - id: ENT-design-tradeoff
    kind: tradeoff
    content: RFC design prose records what the design gains and what complexity, restriction, or ambiguity it accepts.
  - id: ENT-compatibility-constraint
    kind: compatibility_constraint
    content: Compatibility review identifies existing code, mental models, or ecosystem practices that may be affected.
  - id: ENT-migration-cost
    kind: adoption_cost
    content: Migration cost records the work users or tools may need to adopt the design safely.
skeletons:
  - id: SKEL-compatibility-preserving-design-change
    role: retrieval
    projection: projection://samples/formal-rfc-design-rationale-v0
    status: draft
    notes: Supports retrieval for design-change material where a selected mechanism must preserve compatibility boundaries and make migration cost visible.
    nodes:
      - id: SKN-design-problem
        ref:
          kind: occurrence
          id: OCC-problem-framing
        slot: unavailable_or_problematic_current_state
        required: true
      - id: SKN-required-effect
        ref:
          kind: occurrence
          id: OCC-user-impact
        slot: preserved_effect_or_function
        required: true
      - id: SKN-selected-mechanism
        ref:
          kind: occurrence
          id: OCC-design-mechanism
        slot: chosen_operational_form
        required: true
      - id: SKN-tradeoff
        ref:
          kind: occurrence
          id: OCC-tradeoff
        slot: compatibility_boundary
        required: true
      - id: SKN-compatibility-constraint
        ref:
          kind: occurrence
          id: OCC-compatibility-constraint
        slot: preserved_invariant_or_boundary
        required: true
      - id: SKN-migration-cost
        ref:
          kind: occurrence
          id: OCC-migration-cost
        slot: confirmation_signal
        required: false
    links:
      - id: SKL-problem-effect
        from: SKN-design-problem
        to: SKN-required-effect
        type: dependency
        required: true
      - id: SKL-effect-mechanism
        from: SKN-required-effect
        to: SKN-selected-mechanism
        type: dependency
        required: true
      - id: SKL-compatibility-mechanism
        from: SKN-compatibility-constraint
        to: SKN-selected-mechanism
        type: constraint
        required: true
      - id: SKL-tradeoff-mechanism
        from: SKN-tradeoff
        to: SKN-selected-mechanism
        type: constraint
        required: true
      - id: SKL-mechanism-migration
        from: SKN-selected-mechanism
        to: SKN-migration-cost
        type: confirmation
        required: false
structure:
  sections:
    - SEC-motivation
    - SEC-design-choice
    - SEC-compatibility
