entities:
  - id: ENT-problem-framing
    kind: design_problem
    content: Formal design prose begins by identifying the practical or language-level problem that motivates a change.
  - id: ENT-user-impact
    kind: motivation
    content: Motivation sections connect the design problem to concrete developer impact or ecosystem pressure.
  - id: ENT-design-mechanism
    kind: design_choice
    content: Detailed design sections describe the selected mechanism that resolves the motivating problem.
  - id: ENT-design-tradeoff
    kind: tradeoff
    content: RFC design prose records what the design gains and what complexity, restriction, or ambiguity it accepts.
  - id: ENT-compatibility-constraint
    kind: compatibility_constraint
    content: Compatibility review identifies existing code, mental models, or ecosystem practices that may be affected.
  - id: ENT-migration-cost
    kind: adoption_cost
    content: Migration cost records the work users or tools may need to adopt the design safely.
structure:
  sections:
    - SEC-motivation
    - SEC-design-choice
    - SEC-compatibility
