entities:
  - id: ENT-zero-based-indexing
    kind: api_design_choice
    content: The heap representation uses zero-based indexing so the heap behaves naturally as a Python list.
  - id: ENT-min-heap-interface
    kind: api_design_choice
    content: The public API exposes a min-heap, making heap[0] the smallest element.
  - id: ENT-sort-preserves-invariant
    kind: interoperability_property
    content: Sorting the list preserves the heap invariant because the smallest element remains at index 0.
  - id: ENT-heapreplace-contract
    kind: api_contract
    content: heapreplace pops and returns the smallest item before pushing the new item, which is efficient for fixed-size heaps but may return a value larger than the inserted item.
  - id: ENT-heappushpop-contract
    kind: api_contract
    content: heappushpop combines push and pop so workflows can avoid unnecessary heap growth when testing a new candidate item.
