entities:
  - id: ENT-pager-state-boundary
    kind: state_machine_boundary
    content: Pager states define which operations are safe, unsafe, pending, or recoverable at a given moment.
  - id: ENT-transition-discipline
    kind: correctness_constraint
    content: State transitions must be controlled so that write, commit, rollback, and recovery paths do not violate persistence assumptions.
  - id: ENT-dirty-page-risk
    kind: failure_mode
    content: A dirty page represents modified data that may be inconsistent with persistent storage until the write path is safely completed.
  - id: ENT-journal-before-write
    kind: safety_rule
    content: Journal or rollback information must be available before changes can create unrecoverable persistent inconsistency.
  - id: ENT-recovery-invariant
    kind: recovery_invariant
    content: Recovery logic depends on enough persisted information to restore the database to a coherent state after interruption.
  - id: ENT-crash-consistency
    kind: system_goal
    content: The pager design supports crash consistency by coordinating page cache state, journal state, and persistent writes.
