          preserved_effect_or_boundary: preserved_effect_or_function
          alternative_or_operational_form: alternative_space
          confirmation_or_review_signal: confirmation_signal
    decomposition_guidance:
      section_strategy: group by ingredient function and substitution target
      entity_focus:
        - ingredient_function
        - substitution_target
        - preserved_flavor_or_texture
        - verification_gap
    retrieval_expectations:
      primary_match: function-preserving alternative
      expected_outputs:
