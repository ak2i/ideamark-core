spec_version: ideamark-core-v1.2.0
library_id: projection-library://samples/ideamark-core-v1.2.0/v0
status: draft
non_normative: true
purpose: provide sample Projections for CLI, POR, retrieval, and reconstruction development
projection_shape:
  required_fields:
    - id
    - title
    - domain_hint
    - purpose
    - intended_reuse
    - uses_skeleton_families
    - decomposition_guidance
    - retrieval_expectations
    - reconstruction_guidance
    - evaluation_tests
projections:
  - id: projection://samples/recipe-cooking-execution/v0
    title: Recipe Cooking Execution
    domain_hint: recipe
    purpose: Decompose a recipe into executable steps, setup requirements, timing constraints, and completion checks.
    intended_reuse:
      - cooking_checklist
      - step_by_step_assistant
      - beginner_execution_support
    uses_skeleton_families:
      - ref: skeleton-family://samples/procedure-execution-sequencing/v0
        slot_mapping:
          procedure_goal: completed_dish
          prerequisite_or_setup: ingredient_and_tool_setup
          ordered_step: cooking_step
          timing_or_sequence_constraint: timing_or_heat_constraint
          checkpoint_or_completion_signal: doneness_or_serving_signal
          exception_or_recovery_step: mistake_recovery_step
    decomposition_guidance:
      section_strategy: group by executable phase rather than source heading alone
      entity_focus:
        - cooking_step
        - timing_constraint
        - heat_control_rule
        - completion_signal
    retrieval_expectations:
      primary_match: procedure sequence
      expected_outputs:
        - ordered_sections
        - required_prerequisites
    reconstruction_guidance:
      activation_expression_types:
        - checklist
        - stepwise instruction
    evaluation_tests:
      - test missing prerequisite visibility
      - test ordered step reconstruction

  - id: projection://samples/recipe-ingredient-function-substitution/v0
